name: Build OnePlus 8T Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          # 1. ŠALTINIS (Naudojame stabilią šaką, kad išvengtume kodo klaidų)
          kernel-url: https://github.com/LineageOS/android_kernel_oneplus_sm8250
          kernel-branch: lineage-21
          
          # 2. KONFIGŪRACIJA
          config: vendor/kona-perf_defconfig
          arch: arm64
          vendor: false
          kernel-dir: .

          # 3. ĮRANKIAI (Leidžiame skriptui viską parinkti automatiškai)
          android-version: 13
          aosp-gcc: true
          aosp-clang: true
          
          # 4. DOCKER / LXC PALAIKYMAS (Tai įjungia PID_NS, IPC_NS ir kitus "missing")
          lxc: true
          lxc-patch: false
          
          # 5. PAKAVIMAS (Jokių rankinių LLVM=1 nustatymų!)
          anykernel3: true
          extra-make-args: '["KCFLAGS=-w", "WERROR=0"]'
