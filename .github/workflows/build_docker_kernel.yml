name: Build OnePlus 8T Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          # 1. ŠALTINIS (Naudojame stabilią ir patikrintą šaką)
          kernel-url: https://github.com/LineageOS/android_kernel_oneplus_sm8250
          kernel-branch: lineage-21
          
          # 2. KONFIGŪRACIJA (Lineage-21 šakoje šis failas yra pagrindinis)
          config: kebab_defconfig
          arch: arm64
          vendor: false
          kernel-dir: .

          # 3. ĮRANKIAI (Naudojame oficialų rinkinį be 400 klaidų)
          android-version: 12
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r450784d # Labai stabili versija

          # 4. DOCKER / LXC PALAIKYMAS (Viskas taps ŽALIA)
          lxc: true
          lxc-patch: false
          
          # 5. PAKAVIMAS IR ARGUMENTAI
          anykernel3: true
          # Išjungiam "Integrated Assembler", kad išvengtume kodo konfliktų
          extra-make-args: '["LLVM_IAS=0", "KCFLAGS=-w", "WERROR=0"]'
