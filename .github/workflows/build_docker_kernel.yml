name: Build OnePlus 8T Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          # 1. ŠALTINIS
          kernel-url: https://github.com/LineageOS/android_kernel_oneplus_sm8250
          kernel-branch: lineage-21
          
          # 2. KONFIGŪRACIJA
          config: vendor/kona-perf_defconfig
          arch: arm64
          vendor: false
          kernel-dir: .

          # 3. ĮRANKIAI (Parinkta versija, kuri nesukelia 400 klaidos)
          android-version: 11
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r383902 # "Auksinis standartas" 4.19 branduoliams

          # 4. DOCKER / LXC PALAIKYMAS (Tai įjungs visus tavo "missing" nustatymus)
          lxc: true
          lxc-patch: false
          
          # 5. PAKAVIMAS IR ARGUMENTAI
          anykernel3: true
          # Naudojame minimalius nustatymus, kad Makefile nesipyktų
          extra-make-args: '["KCFLAGS=-w", "WERROR=0"]'
