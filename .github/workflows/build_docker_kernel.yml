name: Build OnePlus 8T Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_oneplus_sm8250
          kernel-branch: lineage-23.2

          config: vendor/kona-perf_defconfig
          arch: arm64
          vendor: false
          kernel-dir: .          

          android-version: 12
          aosp-gcc: true
          aosp-clang: false
          other-clang-url: https://github.com/ZyCromerZ/Clang/releases/download/23.0.0git-20260130-release/Clang-23.0.0git-20260130.tar.gz

          lxc: true
          lxc-patch: false

          anykernel3: true
          extra-make-args: '["KCFLAGS=-w", "WERROR=0", "LLVM_IAS=0"]'
