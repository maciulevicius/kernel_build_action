name: Build OnePlus 8T Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_oneplus_sm8250
          kernel-branch: lineage-23

          config: kebab_defconfig
          arch: arm64
          vendor: false
          kernel-dir: .

          android-version: 16
          aosp-gcc: true
          aosp-clang: true

          lxc: true
          lxc-patch: true

          anykernel3: true

          extra-make-args: '[
            "LLVM_IAS=0",
            "KCFLAGS=-w",
            "WERROR=0",
            "CONFIG_NAMESPACES=y",
            "CONFIG_MEMCG=y",
            "CONFIG_CGROUP_PIDS=y",
            "CONFIG_CGROUP_CPUACCT=y",
            "CONFIG_VETH=y",
            "CONFIG_BRIDGE=y",
            "CONFIG_OVERLAY_FS=y",
            "CONFIG_NETFILTER=y",
            "CONFIG_IP_NF_NAT=y",
            "CONFIG_IP_NF_TARGET_MASQUERADE=y"
          ]'
