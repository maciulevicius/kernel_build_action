name: Build OnePlus 8T Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Proton Clang
        run: |
          git clone https://github.com/kdrag0n/proton-clang.git --depth=1 $GITHUB_WORKSPACE/proton-clang
          echo "$GITHUB_WORKSPACE/proton-clang/bin" >> $GITHUB_PATH

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_oneplus_sm8250
          kernel-branch: lineage-23.2
          config: vendor/kona-perf_defconfig
          arch: arm64
          vendor: false
          kernel-dir: .

          aosp-gcc: true
          aosp-clang: false 

          lxc: true
          lxc-patch: false
          anykernel3: true

          extra-make-args: '[
            "LLVM=1",
            "LLVM_IAS=1",
            "CROSS_COMPILE=aarch64-linux-gnu-",
            "CROSS_COMPILE_ARM32=arm-linux-gnueabi-",
            "KCFLAGS=-w",
            "WERROR=0"
            ]'
