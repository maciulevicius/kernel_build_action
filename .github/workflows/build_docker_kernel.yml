name: Build OnePlus 8T Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          # 1. ŠALTINIS (Naudojame stabilią šaką, kad išvengtume kodo klaidų)
          kernel-url: https://github.com/LineageOS/android_kernel_oneplus_sm8250
          kernel-branch: lineage-21
          
          # 2. KONFIGŪRACIJA (Garantuotas kelias iki kona-perf_defconfig)
          config: vendor/kona-perf_defconfig
          arch: arm64
          vendor: false
          kernel-dir: .

          # 3. ĮRANKIAI (Apeiname 400 klaidą)
          android-version: 12
          aosp-gcc: true
          # Išjungiame probleminį Google Clang
          aosp-clang: false
          # Naudojame Proton Clang - jis atsisiunčia be klaidų ir veikia puikiai
          other-clang-url: https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz

          # 4. DOCKER / LXC PALAIKYMAS (Tai sutvarkys tuos "missing" PID_NS ir kt.)
          lxc: true
          lxc-patch: false
          
          # 5. PAKAVIMAS IR KLIPAI
          anykernel3: true
          # Naudojame tik minimalius nustatymus, kad Makefile nesipyktų
          extra-make-args: '["KCFLAGS=-w", "WERROR=0"]'
