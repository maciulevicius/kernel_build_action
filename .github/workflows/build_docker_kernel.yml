name: Build OnePlus 8T HA-Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio flex git libelf-dev libssl-dev make python3 xz-utils curl

      - name: Download ZyC Clang 18
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          curl -L "https://github.com/ZyCromerZ/Clang/releases/download/18.1.8-release/Clang-18.1.8.tar.gz" -o clang.tar.gz
          tar -C $GITHUB_WORKSPACE/clang -xzf clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel
        run: |
          git clone --recursive -b lineage-23.2 --depth 1 https://github.com/LineageOS/android_kernel_oneplus_sm8250 kernel
      
      - name: Patch Kernel for HA Server (Docker + USB + FastCharge)
        run: |
          cd kernel
          # 1. Sutvarkome lūžtantį flash vairuotoją
          echo "/* empty */" > drivers/power/supply/qcom/schgm-flash.c
          
          # 2. IŠTAISOME visas Linker klaidas (Undefined symbols)
          cat <<EOF > drivers/soc/qcom/oplus_server_stubs.c
          #include <linux/export.h>
          #include <linux/types.h>

          int get_project(void) { return 0; }
          EXPORT_SYMBOL(get_project);
          int is_project(int project) { return 0; }
          EXPORT_SYMBOL(is_project);
          int get_boot_mode(void) { return 0; }
          EXPORT_SYMBOL(get_boot_mode);
          int get_PCB_Version(void) { return 0; }
          EXPORT_SYMBOL(get_PCB_Version);
          int qpnp_is_power_off_charging(void) { return 0; }
          EXPORT_SYMBOL(qpnp_is_power_off_charging);
          void msm_drm_notifier_call_chain(unsigned long val, void *v) { }
          EXPORT_SYMBOL(msm_drm_notifier_call_chain);
          void switch_headset_state(int state) { }
          EXPORT_SYMBOL(switch_headset_state);
          void opticalfp_irq_handler_register(void *data) { }
          EXPORT_SYMBOL(opticalfp_irq_handler_register);
          int oplus_gauge_init(void *data) { return 0; }
          EXPORT_SYMBOL(oplus_gauge_init);
          void switch_to_otg_mode(int enable) { }
          EXPORT_SYMBOL(switch_to_otg_mode);
          void opchg_set_pd_sdp(int enable) { }
          EXPORT_SYMBOL(opchg_set_pd_sdp);
          void oplus_vooc_adapter_update_is_rx_gpio(void *data) { }
          EXPORT_SYMBOL(oplus_vooc_adapter_update_is_rx_gpio);
          void oplus_vooc_adapter_update_is_tx_gpio(void *data) { }
          EXPORT_SYMBOL(oplus_vooc_adapter_update_is_tx_gpio);
          int oplus_vooc_get_fastchg_started(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_get_fastchg_started);
          int oplus_vooc_get_fastchg_ing(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_get_fastchg_ing);
          EOF

          echo "obj-y += oplus_server_stubs.o" >> drivers/soc/qcom/Makefile
          
          # 3. Konfigūruojame defconfig Zigbee ir Diskams
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/g' arch/arm64/configs/vendor/kona-perf_defconfig
          
          {
            echo "CONFIG_WERROR=n"
            echo "CONFIG_SECTION_MISMATCH_WARN_ONLY=y"
            # Docker bazė
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_CGROUP_BPF=y"
            # USB Serial (Zigbee lazdelėms: CP210x, FTDI, CH341)
            echo "CONFIG_USB_SERIAL=y"
            echo "CONFIG_USB_SERIAL_CONSOLE=y"
            echo "CONFIG_USB_SERIAL_GENERIC=y"
            echo "CONFIG_USB_SERIAL_CP210X=y"
            echo "CONFIG_USB_SERIAL_FTDI_SIO=y"
            echo "CONFIG_USB_SERIAL_CH341=y"
            echo "CONFIG_USB_SERIAL_OPTION=y"
            # USB Storage (Diskams)
            echo "CONFIG_USB_STORAGE=y"
            echo "CONFIG_USB_UAS=y"
            echo "CONFIG_EXFAT_FS=y"
            echo "CONFIG_NTFS_FS=y"
            # Fast Charge palaikymas
            echo "CONFIG_OPLUS_CHG=y"
          } >> arch/arm64/configs/vendor/kona-perf_defconfig

      - name: Configure Docker/LXC
        run: |
          cd kernel
          curl -L https://raw.githubusercontent.com/dabao1955/kernel_build_action/main/lxc/config.py -o lxc_config.py
          python3 lxc_config.py arch/arm64/configs/vendor/kona-perf_defconfig -w

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make O=out ARCH=arm64 vendor/kona-perf_defconfig
          
          # Build su -j2 dėl RAM taupymo
          make -j2 O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            KCFLAGS="-w -Wno-error" \
            KCPPFLAGS="-D__ANDROID_COMMON_KERNEL__"

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Image-OnePlus8T-HA-Server
          path: kernel/out/arch/arm64/boot/Image
