name: Build Lineage-23-kebab-Docker-Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: sudo apt-get update && sudo apt-get install -y bc bison build-essential flex git libelf-dev libssl-dev make python3 curl zip lz4
      - name: Toolchain
        run: git clone --depth 1 https://github.com/kdrag0n/proton-clang clang
      - name: Source
        run: git clone --depth 1 -b lineage-22.1 https://github.com/LineageOS/android_kernel_oneplus_sm8250 kernel
      - name: Build
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make O=out ARCH=arm64 vendor/kebab_perf_defconfig
          
          # ĮJUNGIAME DOCKER PER SCRIPTS/CONFIG
          ./scripts/config --file out/.config -e NAMESPACES -e NET_NS -e PID_NS -e IPC_NS -e UTS_NS -e USER_NS -e CGROUPS -e MEMCG -e OVERLAY_FS -e VETH -e BRIDGE -e IKCONFIG -e IKCONFIG_PROC
          
          # IŠJUNGIAME LTO - TAI YRA SVARBIAUSIA, KAD VEIKTŲ!
          ./scripts/config --file out/.config -d LTO_CLANG
          ./scripts/config --file out/.config -e LTO_NONE
          
          make O=out ARCH=arm64 olddefconfig
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- Image.gz dtbs

      - name: Create Flashable Zip (AnyKernel3)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          cp ../kernel/out/arch/arm64/boot/Image.gz .
          # Čia surinksime visus DTB, kad tavo telefonas pasileistų
          find ../kernel/out/arch/arm64/boot/dts/vendor/qcom/ -name "*.dtb" -exec cat {} + > dtb
          sed -i 's/device.name1=maguro/device.name1=kebab/g' anykernel.sh
          zip -r ../Kebab-Docker-Kernel.zip *
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kebab-Kernel-Docker
          path: Kebab-Docker-Kernel.zip
