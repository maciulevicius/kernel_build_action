name: Build OnePlus 8T HA-Docker Kernel (Android 16 - STABLE)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio flex git libelf-dev libssl-dev make python3 xz-utils curl zip python2-minimal

      - name: Download AOSP Clang 14 (Official)
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r450784d.tar.gz" -o clang.tar.gz
          tar -C $GITHUB_WORKSPACE/clang -xzf clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8250 kernel

      - name: Patch Kernel (Brute Force Fix)
        run: |
          cd kernel
          # 1. Ištaisome blykstę (schgm-flash)
          echo "/* empty */" > drivers/power/supply/qcom/schgm-flash.c
          
          # 2. Sukuriame FIX failą visoms ld.lld klaidoms (get_project, oplus_gauge ir t.t.)
          # Naudojame "weak" atributą - tai saugiausias būdas išvengti duplikatų
          cat <<EOF > drivers/soc/qcom/oplus_fix.c
          #include <linux/export.h>
          #include <linux/types.h>
          #define W __attribute__((weak))
          W int get_project(void) { return 0; }
          EXPORT_SYMBOL(get_project);
          W int is_project(int project) { return 0; }
          EXPORT_SYMBOL(is_project);
          W int get_boot_mode(void) { return 0; }
          EXPORT_SYMBOL(get_boot_mode);
          W int get_PCB_Version(void) { return 0; }
          EXPORT_SYMBOL(get_PCB_Version);
          W int qpnp_is_power_off_charging(void) { return 0; }
          EXPORT_SYMBOL(qpnp_is_power_off_charging);
          W void msm_drm_notifier_call_chain(unsigned long val, void *v) { }
          EXPORT_SYMBOL(msm_drm_notifier_call_chain);
          W void switch_headset_state(int state) { }
          EXPORT_SYMBOL(switch_headset_state);
          W void opticalfp_irq_handler_register(void *data) { }
          EXPORT_SYMBOL(opticalfp_irq_handler_register);
          W int oplus_gauge_init(void *data) { return 0; }
          EXPORT_SYMBOL(oplus_gauge_init);
          W void switch_to_otg_mode(int enable) { }
          EXPORT_SYMBOL(switch_to_otg_mode);
          W void opchg_set_pd_sdp(int enable) { }
          EXPORT_SYMBOL(opchg_set_pd_sdp);
          W void oplus_vooc_adapter_update_is_rx_gpio(void *data) { }
          EXPORT_SYMBOL(oplus_vooc_adapter_update_is_rx_gpio);
          W void oplus_vooc_adapter_update_is_tx_gpio(void *data) { }
          EXPORT_SYMBOL(oplus_vooc_adapter_update_is_tx_gpio);
          W int oplus_vooc_get_fastchg_started(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_get_fastchg_started);
          W int oplus_vooc_get_fastchg_ing(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_get_fastchg_ing);
          W bool is_flash_active(void) { return false; }
          EXPORT_SYMBOL(is_flash_active);
          W int schgm_flash_torch_priority(int level) { return 0; }
          EXPORT_SYMBOL(schgm_flash_torch_priority);
          W int schgm_flash_init(void *data) { return 0; }
          EXPORT_SYMBOL(schgm_flash_init);
          W bool schgm_flash_get_vreg_ok(void) { return true; }
          EXPORT_SYMBOL(schgm_flash_get_vreg_ok);
          W int schgm_flash_ilim2_irq_handler(int irq, void *data) { return 0; }
          EXPORT_SYMBOL(schgm_flash_ilim2_irq_handler);
          W int schgm_flash_state_change_irq_handler(int irq, void *data) { return 0; }
          EXPORT_SYMBOL(schgm_flash_state_change_irq_handler);
          EOF
          echo "obj-y += oplus_fix.o" >> drivers/soc/qcom/Makefile

          # 3. KONFIGŪRACIJA (Stabiliam krovimuisi)
          DEFCONFIG="arch/arm64/configs/vendor/kona-perf_defconfig"
          
          # Išjungiam LTO ir RWX apsaugas (DĖL ŠITO TELEFONAS HANG'INA TIES GELTONU UŽRAŠU)
          sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_NONE=y/g' $DEFCONFIG
          sed -i 's/CONFIG_STRICT_KERNEL_RWX=y/CONFIG_STRICT_KERNEL_RWX=n/g' $DEFCONFIG
          sed -i 's/CONFIG_STRICT_MODULE_RWX=y/CONFIG_STRICT_MODULE_RWX=n/g' $DEFCONFIG
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/g' $DEFCONFIG
          
          {
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_CGROUP_BPF=y"
            echo "CONFIG_USB_SERIAL=y"
            echo "CONFIG_USB_SERIAL_CP210X=y"
            echo "CONFIG_USB_SERIAL_CH341=y"
            echo "CONFIG_USB_SERIAL_FTDI_SIO=y"
            echo "CONFIG_USB_STORAGE=y"
            echo "CONFIG_NTFS_FS=y"
            echo "CONFIG_EXFAT_FS=y"
          } >> $DEFCONFIG

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make O=out ARCH=arm64 vendor/kona-perf_defconfig
          make O=out ARCH=arm64 olddefconfig
          # Buildiname Image.gz-dtb (pats saugiausias krovikliui)
          make -j2 O=out ARCH=arm64 \
            CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 KCFLAGS="-w -Wno-error" Image.gz-dtb

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus8T-HA-Server-Kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
