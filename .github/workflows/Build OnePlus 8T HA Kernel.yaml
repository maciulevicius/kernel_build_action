name: Build OnePlus 8T HA-Server Kernel (Android 16)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio flex git libelf-dev libssl-dev make python3 xz-utils curl zip python2-minimal

      - name: Clone Toolchain
        run: |
          git clone --depth 1 https://github.com/kdrag0n/proton-clang clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          # Naudojame oficialią LineageOS repozitoriją
          git clone --depth 1 -b lineage-21 https://github.com/LineageOS/android_kernel_oneplus_sm8250 kernel

      - name: Patch Kernel (Surgical Fix)
        run: |
          cd kernel
          # 1. Sutvarkome blykstės vairuotoją (schgm-flash)
          # Užuot stubinę, mes tiesiog išvalome failą, bet paliekame antraštes
          echo "#include <linux/module.h>" > drivers/power/supply/qcom/schgm-flash.c
          echo "int schgm_flash_init(void *data) { return 0; }" >> drivers/power/supply/qcom/schgm-flash.c
          
          # 2. IŠTRINAME probleminius kvietimus iš baterijos vairuotojo
          # Tai geriau nei kurti stubs, nes nebus "duplicate symbol" klaidų
          sed -i '/schgm_flash/d' drivers/power/supply/qcom/oplus_battery_msm8250.c
          sed -i '/is_flash_active/d' drivers/power/supply/qcom/oplus_battery_msm8250.c
          
          # 3. KONFIGŪRACIJA
          DEFCONFIG="arch/arm64/configs/vendor/kona-perf_defconfig"
          
          # IŠJUNGIAME LTO ir WERROR (Kad nebūtų hang starto metu ir klaidų)
          sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_NONE=y/g' $DEFCONFIG
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/g' $DEFCONFIG
          
          {
            echo "CONFIG_LTO_NONE=y"
            echo "CONFIG_WERROR=n"
            # Docker bazė
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_CGROUP_BPF=y"
            # USB Serial Zigbee lazdelėms
            echo "CONFIG_USB_SERIAL=y"
            echo "CONFIG_USB_SERIAL_CP210X=y"
            echo "CONFIG_USB_SERIAL_CH341=y"
            echo "CONFIG_USB_SERIAL_FTDI_SIO=y"
            echo "CONFIG_USB_SERIAL_OPTION=y"
            # Storage
            echo "CONFIG_USB_STORAGE=y"
            echo "CONFIG_EXFAT_FS=y"
          } >> $DEFCONFIG

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make O=out ARCH=arm64 vendor/kona-perf_defconfig
          make O=out ARCH=arm64 olddefconfig
          # Buildiname Image.gz-dtb (su integruotu įrenginio medžiu)
          make -j2 O=out ARCH=arm64 \
            CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 KCFLAGS="-w" Image.gz-dtb

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Image-OnePlus8T-Docker
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
