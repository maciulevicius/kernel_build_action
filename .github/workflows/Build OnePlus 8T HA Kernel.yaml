name: Build Singularity HA-Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio flex git libelf-dev libssl-dev make python3 xz-utils curl zip python2-minimal

      - name: Clone Toolchain
        run: |
          git clone --depth 1 https://github.com/kdrag0n/proton-clang clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Singularity Kernel
        run: |
          git clone --depth 1 -b interconnect https://github.com/The-Anomalist/Singularity.git kernel

      - name: Patch Config
        run: |
          cd kernel
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '1i#include "smb5-lib.h"' drivers/power/supply/qcom/schgm-flash.c
          
          CONF="arch/arm64/configs/vendor/kona-perf_defconfig"
          
          # IŠJUNGIAME LTO ir WERROR (Stabilumui)
          sed -i '/CONFIG_LTO/d' $CONF
          sed -i '/CONFIG_LTO_CLANG/d' $CONF
          sed -i '/CONFIG_THINLTO/d' $CONF
          
          # ĮJUNGIAME Docker ir USB Serial (Zigbee)
          {
            echo "CONFIG_LTO_NONE=y"
            echo "CONFIG_WERROR=n"
            # Docker palaikymas
            echo "CONFIG_NAMESPACES=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_CGROUPS=y"
            echo "CONFIG_CGROUP_BPF=y"
            echo "CONFIG_MEMCG=y"
            echo "CONFIG_MEMCG_SWAP=y"
            echo "CONFIG_MEMCG_SWAP_ENABLED=y"
            echo "CONFIG_BLK_DEV_THROTTLING=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            # USB Zigbee Stick'ai (CP210x, CH341, FTDI, ACM)
            echo "CONFIG_USB_SERIAL=y"
            echo "CONFIG_USB_SERIAL_GENERIC=y"
            echo "CONFIG_USB_SERIAL_CP210X=y"
            echo "CONFIG_USB_SERIAL_CH341=y"
            echo "CONFIG_USB_SERIAL_FTDI_SIO=y"
            echo "CONFIG_USB_ACM=y"
            # USB Diskai ir Failų sistemos
            echo "CONFIG_USB_STORAGE=y"
            echo "CONFIG_BLK_DEV_SD=y"
            echo "CONFIG_EXT4_FS=y"
            echo "CONFIG_FUSE_FS=y"
            echo "CONFIG_MSDOS_FS=y"
            echo "CONFIG_VFAT_FS=y"
            echo "CONFIG_EXFAT_FS=y"
            echo "CONFIG_NTFS_FS=y"
          } >> $CONF

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          mkdir -p out
          make O=out ARCH=arm64 vendor/kona-perf_defconfig
          make O=out ARCH=arm64 olddefconfig
          # Buildiname Image.gz ir dtbs
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 KCFLAGS="-w" Image.gz dtbs

      - name: Create Image.gz-dtb (Auto-Locate)
        run: |
          cd kernel
          # SURANDAME branduolį ir DTB failą, kad ir kur jie būtų 'out' aplanke
          KERNEL_GZ=$(find out -name "Image.gz" | head -n 1)
          KONA_DTB=$(find out -name "kona.dtb" | head -n 1)
          
          echo "Rastas branduolys: $KERNEL_GZ"
          echo "Rastas DTB: $KONA_DTB"
          
          if [ -z "$KERNEL_GZ" ] || [ -z "$KONA_DTB" ]; then
            echo "KLAIDA: Nepavyko rasti Image.gz arba kona.dtb!"
            ls -R out
            exit 1
          fi
          
          # Sujungiame juos į vieną Image.gz-dtb failą
          cat $KERNEL_GZ $KONA_DTB > Image.gz-dtb
          echo "Image.gz-dtb sėkmingai sukurtas!"

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Singularity-HA-Kernel
          path: kernel/Image.gz-dtb
