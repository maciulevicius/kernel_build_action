name: Build OnePlus 8T HA-Server Kernel (Android 16 Fix)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio flex git libelf-dev libssl-dev make python3 xz-utils curl zip python2-minimal

      - name: Clone Toolchain
        run: |
          git clone --depth 1 https://github.com/kdrag0n/proton-clang clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          # Naudojame tavo LineageOS 23.2 branduolio šaltinį
          git clone --depth 1 -b lineage-21 https://github.com/LineageOS/android_kernel_oneplus_sm8250 kernel

      - name: Patch Kernel (Brute Force Patching)
        run: |
          cd kernel
          # 1. Sutvarkome blykstę
          echo "/* empty */" > drivers/power/supply/qcom/schgm-flash.c
          
          # 2. ĮRAŠOME VISAS TRŪKSTAMAS FUNKCIJAS Į SOCINFO.C
          # Tai garantuoja, kad linkeris jas ras, ir nebus jokių duplikatų klaidų.
          cat <<EOF >> drivers/soc/qcom/socinfo.c
          int get_project(void) { return 0; }
          int is_project(int project) { return 0; }
          int get_boot_mode(void) { return 0; }
          int get_PCB_Version(void) { return 0; }
          int qpnp_is_power_off_charging(void) { return 0; }
          void msm_drm_notifier_call_chain(unsigned long val, void *v) { }
          void switch_headset_state(int state) { }
          void opticalfp_irq_handler_register(void *data) { }
          int oplus_gauge_init(void *data) { return 0; }
          void switch_to_otg_mode(int enable) { }
          void opchg_set_pd_sdp(int enable) { }
          void oplus_vooc_adapter_update_is_rx_gpio(void *data) { }
          void oplus_vooc_adapter_update_is_tx_gpio(void *data) { }
          int oplus_vooc_get_fastchg_started(void) { return 0; }
          int oplus_vooc_get_fastchg_ing(void) { return 0; }
          bool is_flash_active(void) { return false; }
          int schgm_flash_torch_priority(int level) { return 0; }
          int schgm_flash_init(void *data) { return 0; }
          bool schgm_flash_get_vreg_ok(void) { return true; }
          int schgm_flash_ilim2_irq_handler(int irq, void *data) { return 0; }
          int schgm_flash_state_change_irq_handler(int irq, void *data) { return 0; }
          EOF

          # 3. KONFIGŪRACIJA
          DEFCONFIG="arch/arm64/configs/vendor/kona-perf_defconfig"
          
          # IŠJUNGIAME LTO (SVARBU: tai išsprendžia užstrigimą ties geltonu užrašu)
          sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_NONE=y/g' $DEFCONFIG
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/g' $DEFCONFIG
          
          {
            echo "CONFIG_LTO_NONE=y"
            echo "CONFIG_WERROR=n"
            # Docker bazė
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_CGROUP_BPF=y"
            # USB Serial Zigbee lazdelėms
            echo "CONFIG_USB_SERIAL=y"
            echo "CONFIG_USB_SERIAL_CP210X=y"
            echo "CONFIG_USB_SERIAL_CH341=y"
            echo "CONFIG_USB_SERIAL_FTDI_SIO=y"
            echo "CONFIG_USB_SERIAL_OPTION=y"
            # Išoriniai diskai
            echo "CONFIG_USB_STORAGE=y"
            echo "CONFIG_EXFAT_FS=y"
          } >> $DEFCONFIG

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make O=out ARCH=arm64 vendor/kona-perf_defconfig
          make O=out ARCH=arm64 olddefconfig
          # Buildiname Image.gz-dtb (su integruotu DTB)
          make -j2 O=out ARCH=arm64 \
            CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 KCFLAGS="-w -Wno-error" Image.gz-dtb

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Image-OnePlus8T-Docker
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
