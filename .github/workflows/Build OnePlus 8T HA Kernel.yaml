name: Build OnePlus 8T HA-Server Kernel (Android 16 FIX)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio flex git libelf-dev libssl-dev make python3 xz-utils curl zip python2-minimal

      - name: Clone Proton Clang
        run: |
          git clone --depth 1 https://github.com/kdrag0n/proton-clang clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          git clone --depth 1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8250 kernel

      - name: Patch Kernel (Weak Symbols Fix)
        run: |
          cd kernel
          # 1. Sutvarkome blykstės vairuotoją
          echo "/* empty */" > drivers/power/supply/qcom/schgm-flash.c
          
          # 2. Sukuriame WEAK simbolių failą. 
          # __attribute__((weak)) užtikrins, kad nebus "duplicate symbol" klaidų!
          cat <<EOF > drivers/soc/qcom/oplus_weak_fix.c
          #include <linux/export.h>
          #include <linux/types.h>

          #define WEAK_STUB __attribute__((weak))

          WEAK_STUB int get_project(void) { return 0; }
          EXPORT_SYMBOL(get_project);
          WEAK_STUB int is_project(int project) { return 0; }
          EXPORT_SYMBOL(is_project);
          WEAK_STUB int get_boot_mode(void) { return 0; }
          EXPORT_SYMBOL(get_boot_mode);
          WEAK_STUB int get_PCB_Version(void) { return 0; }
          EXPORT_SYMBOL(get_PCB_Version);
          WEAK_STUB int qpnp_is_power_off_charging(void) { return 0; }
          EXPORT_SYMBOL(qpnp_is_power_off_charging);
          WEAK_STUB void msm_drm_notifier_call_chain(unsigned long val, void *v) { }
          EXPORT_SYMBOL(msm_drm_notifier_call_chain);
          WEAK_STUB void switch_headset_state(int state) { }
          EXPORT_SYMBOL(switch_headset_state);
          WEAK_STUB void opticalfp_irq_handler_register(void *data) { }
          EXPORT_SYMBOL(opticalfp_irq_handler_register);
          WEAK_STUB int oplus_gauge_init(void *data) { return 0; }
          EXPORT_SYMBOL(oplus_gauge_init);
          WEAK_STUB void switch_to_otg_mode(int enable) { }
          EXPORT_SYMBOL(switch_to_otg_mode);
          WEAK_STUB void opchg_set_pd_sdp(int enable) { }
          EXPORT_SYMBOL(opchg_set_pd_sdp);
          WEAK_STUB void oplus_vooc_adapter_update_is_rx_gpio(void *data) { }
          EXPORT_SYMBOL(oplus_vooc_adapter_update_is_rx_gpio);
          WEAK_STUB void oplus_vooc_adapter_update_is_tx_gpio(void *data) { }
          EXPORT_SYMBOL(oplus_vooc_adapter_update_is_tx_gpio);
          WEAK_STUB int oplus_vooc_get_fastchg_started(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_get_fastchg_started);
          WEAK_STUB int oplus_vooc_get_fastchg_ing(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_get_fastchg_ing);
          WEAK_STUB bool is_flash_active(void) { return false; }
          EXPORT_SYMBOL(is_flash_active);
          WEAK_STUB int schgm_flash_torch_priority(int level) { return 0; }
          EXPORT_SYMBOL(schgm_flash_torch_priority);
          WEAK_STUB int schgm_flash_init(void *data) { return 0; }
          EXPORT_SYMBOL(schgm_flash_init);
          WEAK_STUB bool schgm_flash_get_vreg_ok(void) { return true; }
          EXPORT_SYMBOL(schgm_flash_get_vreg_ok);
          WEAK_STUB int schgm_flash_ilim2_irq_handler(int irq, void *data) { return 0; }
          EXPORT_SYMBOL(schgm_flash_ilim2_irq_handler);
          WEAK_STUB int schgm_flash_state_change_irq_handler(int irq, void *data) { return 0; }
          EXPORT_SYMBOL(schgm_flash_state_change_irq_handler);
          EOF
          echo "obj-y += oplus_weak_fix.o" >> drivers/soc/qcom/Makefile

          # 3. Konfigūracija
          DEFCONFIG="arch/arm64/configs/vendor/kona-perf_defconfig"
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/g' $DEFCONFIG
          {
            echo "CONFIG_WERROR=n"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_CGROUP_BPF=y"
            echo "CONFIG_USB_SERIAL=y"
            echo "CONFIG_USB_SERIAL_CP210X=y"
            echo "CONFIG_USB_SERIAL_CH341=y"
            echo "CONFIG_USB_SERIAL_FTDI_SIO=y"
            echo "CONFIG_USB_STORAGE=y"
          } >> $DEFCONFIG

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make O=out ARCH=arm64 vendor/kona-perf_defconfig
          make O=out ARCH=arm64 olddefconfig
          make -j2 O=out ARCH=arm64 \
            CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 KCFLAGS="-w -Wno-error" Image.gz-dtb

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus8T-Server-Kernel-Final
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
