name: Build Singularity HA-Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio flex git libelf-dev libssl-dev make python3 xz-utils curl zip python2-minimal

      - name: Clone Proton Clang
        run: |
          git clone --depth 1 https://github.com/kdrag0n/proton-clang clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Singularity Kernel Source (Correct URL)
        run: |
          # Naudojame tavo nurodytą Singularity repozitoriją (branch 14 yra skirtas SM8250)
          git clone --depth 1 -b 14 https://github.com/The-Anomalist/Singularity.git kernel

      - name: Patch Config (Docker & USB & LTO Fix)
        run: |
          cd kernel
          DEFCONFIG="arch/arm64/configs/vendor/kona-perf_defconfig"
          
          # 1. IŠJUNGIAME LTO (SVARBU: tai sutvarko "geltoną užrašą" ir pakibimą)
          sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_NONE=y/g' $DEFCONFIG
          sed -i 's/CONFIG_LTO=y/CONFIG_LTO_NONE=y/g' $DEFCONFIG
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/g' $DEFCONFIG
          
          # 2. ĮJUNGIAME Docker palaikymą
          {
            echo "CONFIG_LTO_NONE=y"
            echo "CONFIG_WERROR=n"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_CGROUP_BPF=y"
            echo "CONFIG_MEMCG_SWAP=y"
            echo "CONFIG_MEMCG_SWAP_ENABLED=y"
            echo "CONFIG_BLK_DEV_THROTTLING=y"
            
            # 3. ĮJUNGIAME USB Serial (Zigbee lazdelėms: CP210x, FTDI, CH341, PL2303)
            echo "CONFIG_USB_SERIAL=y"
            echo "CONFIG_USB_SERIAL_GENERIC=y"
            echo "CONFIG_USB_SERIAL_CP210X=y"
            echo "CONFIG_USB_SERIAL_FTDI_SIO=y"
            echo "CONFIG_USB_SERIAL_CH341=y"
            echo "CONFIG_USB_SERIAL_PL2303=y"
            echo "CONFIG_USB_SERIAL_OPTION=y"
            
            # 4. ĮJUNGIAME Išorinius diskus (exFAT, NTFS, UAS)
            echo "CONFIG_USB_STORAGE=y"
            echo "CONFIG_USB_UAS=y"
            echo "CONFIG_EXFAT_FS=y"
            echo "CONFIG_NTFS_FS=y"
          } >> $DEFCONFIG

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          
          # Konfigūruojame
          make O=out ARCH=arm64 vendor/kona-perf_defconfig
          make O=out ARCH=arm64 olddefconfig
          
          # Buildiname Image.gz-dtb (branduolys + įrenginio medis viename)
          make -j2 O=out ARCH=arm64 \
            CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 KCFLAGS="-w -Wno-error" Image.gz-dtb

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Singularity-HA-Docker-Kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
