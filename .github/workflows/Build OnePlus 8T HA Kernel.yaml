name: Build Singularity HA-Docker Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio flex git libelf-dev libssl-dev make python3 xz-utils curl zip python2-minimal

      - name: Clone Toolchain
        run: |
          git clone --depth 1 https://github.com/kdrag0n/proton-clang clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Singularity Kernel
        run: |
          git clone --depth 1 -b interconnect https://github.com/The-Anomalist/Singularity.git kernel

      - name: Patch Kernel Source and Config
        run: |
          cd kernel
          # 1. Pašaliname trūkstamą KernelSU
          sed -i '/kernelsu/d' drivers/Kconfig
          
          # 2. IŠTAISOME krovimo draiverio klaidą (schgm-flash.c)
          # Užuot taisę kodą, mes jį agresyviai pakeičiame tuščiomis funkcijomis,
          # kad kompiliatorius nebeišmestų "incomplete definition" klaidų.
          # Home Assistant serveriui blykstės krovimo valdymas nereikalingas.
          cat <<EOF > drivers/power/supply/qcom/schgm-flash.c
          #include <linux/module.h>
          #include <linux/device.h>
          #include "smb5-lib.h"
          #include "schgm-flash.h"
          int schgm_flash_get_vreg_ok(struct smb_charger *chg, int *val) { return 0; }
          void schgm_flash_torch_priority(struct smb_charger *chg, enum torch_mode mode) {}
          int schgm_flash_init(struct smb_charger *chg) { return 0; }
          bool is_flash_active(struct smb_charger *chg) { return false; }
          EOF

          # 3. Nustatome defconfig kelią
          CONF="arch/arm64/configs/vendor/kona-perf_defconfig"

          # 4. IŠVALOME senuosius LTO ir WERROR nustatymus (kad neklaustų interaktyviai)
          sed -i '/CONFIG_LTO/d' $CONF
          sed -i '/CONFIG_LTO_CLANG/d' $CONF
          sed -i '/CONFIG_THINLTO/d' $CONF
          sed -i '/CONFIG_WERROR/d' $CONF

          # 5. ĮJUNGIAME viską Docker, Zigbee ir USB diskams
          {
            echo "CONFIG_LTO_NONE=y"
            echo "CONFIG_WERROR=n"
            # Docker branduolys (Būtina Home Assistant)
            echo "CONFIG_NAMESPACES=y"
            echo "CONFIG_NET_NS=y"
            echo "CONFIG_PID_NS=y"
            echo "CONFIG_IPC_NS=y"
            echo "CONFIG_UTS_NS=y"
            echo "CONFIG_CGROUPS=y"
            echo "CONFIG_CGROUP_CPUACCT=y"
            echo "CONFIG_CGROUP_DEVICE=y"
            echo "CONFIG_CGROUP_FREEZER=y"
            echo "CONFIG_CGROUP_SCHED=y"
            echo "CONFIG_CPUSETS=y"
            echo "CONFIG_MEMCG=y"
            echo "CONFIG_KEYS=y"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_VETH=y"
            echo "CONFIG_BRIDGE=y"
            echo "CONFIG_IP_NF_FILTER=y"
            echo "CONFIG_IP_NF_TARGET_MASQUERADE=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y"
            echo "CONFIG_NETFILTER_XT_MATCH_IPVS=y"
            echo "CONFIG_IP_NF_NAT=y"
            # USB Serial (Zigbee: Sonoff, Conbee ir t.t.)
            echo "CONFIG_USB_SERIAL=y"
            echo "CONFIG_USB_SERIAL_GENERIC=y"
            echo "CONFIG_USB_SERIAL_CP210X=y"
            echo "CONFIG_USB_SERIAL_CH341=y"
            echo "CONFIG_USB_SERIAL_FTDI_SIO=y"
            echo "CONFIG_USB_ACM=y"
            # USB Diskai
            echo "CONFIG_USB_STORAGE=y"
            echo "CONFIG_BLK_DEV_SD=y"
          } >> $CONF

      - name: Build Kernel
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          mkdir -p out
          make O=out ARCH=arm64 vendor/kona-perf_defconfig
          # NAUDOJAME 'yes ""', kad automatiškai parinktų nutylėtas vertes ir nesustotų
          yes "" | make O=out ARCH=arm64 olddefconfig
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 KCFLAGS="-w" Image.gz dtbs
      
      - name: Create Image.gz-dtb (Auto-Locate)
        run: |
          cd kernel
          # SURANDAME branduolį ir DTB failą, kad ir kur jie būtų 'out' aplanke
          KERNEL_GZ=$(find out -name "Image.gz" | head -n 1)
          KONA_DTB=$(find out -name "kona.dtb" | head -n 1)
          
          echo "Rastas branduolys: $KERNEL_GZ"
          echo "Rastas DTB: $KONA_DTB"
          
          if [ -z "$KERNEL_GZ" ] || [ -z "$KONA_DTB" ]; then
            echo "KLAIDA: Nepavyko rasti Image.gz arba kona.dtb!"
            ls -R out
            exit 1
          fi
          
          # Sujungiame juos į vieną Image.gz-dtb failą
          cat $KERNEL_GZ $KONA_DTB > Image.gz-dtb
          echo "Image.gz-dtb sėkmingai sukurtas!"

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Singularity-HA-Kernel
          path: kernel/Image.gz-dtb
